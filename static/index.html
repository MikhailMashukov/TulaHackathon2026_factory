<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Весёлый плановик — Райтек ДТГ × TulaHack 2026</title>
<link rel="stylesheet" href="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.css">
<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #1a1a1a; color: #e8e8e8; }
  header { background: #ff6b1a; color: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { margin: 0; font-size: 18px; }
  header .sub { font-size: 12px; opacity: 0.85; }
  .toolbar { background: #2a2a2a; padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  button { background: #ff6b1a; color: #111; border: 0; padding: 6px 12px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; }
  button:hover { background: #ff8a3d; }
  button.secondary { background: #444; color: #e8e8e8; }
  button.danger { background: #c0392b; color: #fff; }
  button.speed.active { outline: 2px solid #fff; }

  .layout { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 110px); }

  .machines-pane { background: #202020; padding: 12px; border-right: 1px solid #3b3b3b; overflow-y: auto; }
  .machines-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .machine-card { background: #2c2c2c; border: 1px solid #3c3c3c; border-left: 4px solid #555; border-radius: 6px; padding: 8px; font-size: 12px; }
  .machine-card.ok { border-left-color: #5fbf5f; }
  .machine-card.warn { border-left-color: #e67e22; }
  .machine-card.bad { border-left-color: #c0392b; }
  .machine-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .type-dot { width: 8px; height: 24px; border-radius: 3px; display: inline-block; }
  .machine-title { font-weight: 700; margin-bottom: 0; }
  .machine-meta { color: #aaa; font-size: 11px; margin-bottom: 2px; }
  .machine-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px; color: #bbb; font-size: 11px; }

  .buffers { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .buffer { background: #222; border: 1px solid #3c3c3c; border-radius: 6px; padding: 6px; min-height: 56px; }
  .buffer h4 { margin: 0 0 4px 0; font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: .3px; }
  .stack { display: flex; flex-wrap: wrap; gap: 4px; }
  .stack-group { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #0006; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(5, 1fr); gap: 1px; padding: 1px; background: #111; }
  .stack-group i { width: 5px; height: 2px; border-radius: 1px; opacity: 0.18; align-self: center; justify-self: center; }
  .stack-group i.filled { opacity: 0.95; }

  .right-pane { background: #222; display: grid; grid-template-rows: 1fr auto; }
  #timeline { background: #fff; min-height: 300px; }
  .right-bottom { border-top: 1px solid #444; padding: 12px; overflow-y: auto; }

  .vis-item { border-color: #ff6b1a; background: #ffd9bf; color: #111; font-size: 11px; }
  .vis-item.priority-1 { background: #ff8a3d; border-color: #c0392b; color: #fff; }
  .vis-item.priority-3 { background: #cccccc; }

  .section-title { font-size: 14px; margin: 0 0 8px 0; color: #ff6b1a; text-transform: uppercase; }
  .score-grid { display: grid; grid-template-columns: 1fr auto; gap: 4px 12px; font-size: 13px; margin-bottom: 14px; }
  .score-grid .label { color: #aaa; }
  .score-grid .total { font-size: 20px; font-weight: 700; color: #ff6b1a; }
  .events-list { font-size: 12px; max-height: 140px; overflow-y: auto; }
  .event-item { padding: 6px; margin-bottom: 4px; background: #2c2c2c; border-left: 3px solid #ff6b1a; }
  .event-item.resolved { opacity: 0.5; border-left-color: #555; }
  .advice { background: #2c3a2c; border-left: 3px solid #5fbf5f; padding: 8px; font-size: 12px; margin-top: 8px; white-space: pre-wrap; }
  .advice .src { color: #888; font-size: 10px; margin-top: 4px; }
  #now-readout { font-weight: 700; color: #ff6b1a; }
  .help { font-size: 11px; color: #888; }

  .modal { position: fixed; inset: 0; background: #0009; display: none; align-items: center; justify-content: center; z-index: 10; }
  .modal.open { display: flex; }
  .modal-card { width: min(900px, 90vw); max-height: 85vh; overflow-y: auto; background: #1f1f1f; border: 1px solid #555; border-radius: 8px; padding: 14px; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .modal-head h3 { margin: 0; color: #ff6b1a; }
  .table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .table th,.table td { border-bottom: 1px solid #333; padding: 6px; text-align: left; }
  .route { margin-bottom: 10px; border: 1px solid #333; border-radius: 6px; padding: 8px; }
  .route-steps { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; color: #ddd; }
  .step-pill { border: 1px solid #444; border-radius: 999px; padding: 2px 8px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Весёлый плановик</h1>
    <div class="sub">Райтек ДТГ × TulaHack 2026 — MVP симулятор</div>
  </div>
  <div>Игр.минута: <span id="now-readout">0</span> / <span id="horizon-readout">480</span></div>
</header>

<div class="toolbar">
  <button id="speed-1" class="speed" onclick="setSpeed(1)">1x</button>
  <button id="speed-4" class="speed" onclick="setSpeed(4)">4x</button>
  <button id="speed-20" class="speed" onclick="setSpeed(20)">20x</button>
  <button id="speed-0" class="speed secondary" onclick="setSpeed(0)">Пауза</button>
  <button class="secondary" onclick="doReplan()">Перепланировать</button>
  <button class="danger" onclick="randomEvent()">Случайное событие</button>
  <button onclick="askCopilot()">Спросить копилот</button>
  <button class="secondary" onclick="openOrdersModal()">Заказ клиента</button>
  <button class="secondary" onclick="openRoutesModal()">Маршруты изготовления</button>
  <button class="secondary" onclick="reset()">Сброс</button>
  <span class="help">Drag-and-drop: тяните операцию на другой станок (только однотипный).</span>
</div>

<div class="layout">
  <aside class="machines-pane">
    <div id="machines-list" class="machines-grid">Загрузка...</div>
  </aside>

  <section class="right-pane">
    <div id="timeline"></div>
    <div class="right-bottom">
      <h2 class="section-title">Счёт</h2>
      <div class="score-grid" id="score-grid"></div>

      <h2 class="section-title">События</h2>
      <div class="events-list" id="events-list">Пока нет</div>

      <h2 class="section-title">Копилот</h2>
      <div id="advice-box">Нажмите «Спросить копилот» при событии или вообще.</div>
    </div>
  </section>
</div>

<div id="orders-modal" class="modal" onclick="closeModal(event, 'orders-modal')">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>Заказ клиента</h3>
      <button class="secondary" onclick="closeModalById('orders-modal')">Закрыть</button>
    </div>
    <div id="orders-modal-body"></div>
  </div>
</div>

<div id="routes-modal" class="modal" onclick="closeModal(event, 'routes-modal')">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>Маршруты изготовления</h3>
      <button class="secondary" onclick="closeModalById('routes-modal')">Закрыть</button>
    </div>
    <div id="routes-modal-body"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
